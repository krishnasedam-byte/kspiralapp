<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Spiral Compounding - Fibonacci-based equity portfolio with GTT ladder automation">
  <title>Spiral</title>
  
  <!-- 
    SPIRAL APP v74 - Rebuild 2026-06-16
    
    NOTE: Old JS file (analyze-portfolio-FIXED.js) should be deployed as a Netlify function.
    Instructions:
    1. Create /netlify/functions/analyze-portfolio.js
    2. Copy content from analyze-portfolio-FIXED.js
    3. Deploy to Netlify
    4. Call from Daily Brief via fetch() to /api/analyze-portfolio
    5. Display analysis results below Quick Actions
    
    This app is the UI layer. The JS file is the AI analysis layer (separate deployment).
  -->
  
  <style>
    /* Design Tokens */
    :root {
      --bg1: #0f0f1e;
      --bg2: #1a1a2e;
      --bg3: #2a2a4e;
      --border: #3a3a5e;
      --green: #10b981;
      --red: #ef4444;
      --warn: #f59e0b;
      --info: #3b82f6;
      --text: #f0f0f0;
      --textS: #a0a0b0;
      --textT: #707080;
      --mono: 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg1);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* App Header */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .app-meta {
      font-size: 11px;
      color: var(--textS);
      text-align: center;
      flex: 1;
      margin-left: 12px;
    }

    .refresh-btn {
      background: var(--bg3);
      border: none;
      color: var(--info);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background: var(--border);
      transform: rotate(180deg);
    }

    /* Navigation Tabs */
    .nav-tabs {
      display: flex;
      gap: 2px;
      background: var(--bg2);
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    .nav-tab {
      background: none;
      border: none;
      color: var(--textS);
      cursor: pointer;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-tab:hover {
      color: var(--text);
    }

    .nav-tab.active {
      color: var(--info);
      border-bottom-color: var(--info);
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Stat Row */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .stat {
      background: var(--bg3);
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .stat:hover {
      border-color: var(--info);
    }

    .stat-l {
      font-size: 10px;
      color: var(--textS);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-v {
      font-size: 15px;
      font-weight: 700;
      font-family: var(--mono);
      line-height: 1.2;
    }

    .stat-v.green { color: var(--green); }
    .stat-v.red { color: var(--red); }
    .stat-v.warn { color: var(--warn); }
    .stat-v.info { color: var(--info); }

    .stat-s {
      font-size: 9px;
      color: var(--textT);
      margin-top: 2px;
      font-family: var(--mono);
    }

    /* Sub-tabs */
    .sub-tabs {
      display: flex;
      gap: 2px;
      padding: 8px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .sub-tabs::-webkit-scrollbar {
      display: none;
    }

    .sub-tab {
      background: none;
      border: none;
      color: var(--textS);
      cursor: pointer;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .sub-tab:hover {
      color: var(--text);
    }

    .sub-tab.active {
      color: var(--info);
      border-bottom-color: var(--info);
    }

    /* Screen Container */
    .screens {
      flex: 1;
      overflow-y: auto;
    }

    .screen {
      display: none;
      padding: 12px 16px;
      background: var(--bg1);
      color: var(--text);
      animation: fadeIn 0.1s ease-in;
    }

    .screen.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Holdings List */
    .h-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .h-row:last-child {
      border-bottom: none;
    }

    .h-stock {
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .h-cmp {
      cursor: pointer;
      text-decoration: underline dotted;
      color: var(--info);
      font-weight: 600;
      font-family: var(--mono);
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .h-cmp:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .h-unr {
      font-size: 12px;
      font-weight: 600;
      font-family: var(--mono);
    }

    .h-right {
      text-align: right;
      flex-shrink: 0;
    }

    /* GTT Tables */
    .gtt-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .gtt-table th {
      background: var(--bg3);
      padding: 8px;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border);
    }

    .gtt-table td {
      padding: 8px;
      border: 1px solid var(--border);
      font-family: var(--mono);
    }

    /* Modals */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--bg3);
      border: none;
      color: var(--text);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 4px;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      color: var(--textS);
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: var(--mono);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--info);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }

    .form-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--info);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--text);
    }

    .btn-danger {
      background: var(--red);
      color: white;
    }

    .btn-danger:hover {
      opacity: 0.9;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg2);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--textT);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .stat-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .modal-content {
        width: 95%;
        max-height: 90vh;
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="app-header">
    <div class="app-name">Spiral</div>
    <div class="app-meta" id="status-meta">Initializing...</div>
    <button class="refresh-btn" onclick="location.reload()">↺ Reset</button>
  </div>

  <!-- Main Navigation -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchMainTab('portfolio')">📊 Portfolio</button>
    <button class="nav-tab" onclick="switchMainTab('cycles')">📈 Cycles</button>
    <button class="nav-tab" onclick="switchMainTab('settings')">⚙️ Settings</button>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Portfolio Screen -->
    <div id="screen-portfolio">
      <!-- Stat Cards -->
      <div class="stat-row">
        <div class="stat" onclick="editAvail()">
          <div class="stat-l">Invested</div>
          <div class="stat-v" id="s-inv">₹0</div>
        </div>
        <div class="stat">
          <div class="stat-l">Current Value</div>
          <div class="stat-v" id="s-cur">₹0</div>
        </div>
        <div class="stat" onclick="editAvail()">
          <div class="stat-l">Cash · ICICI</div>
          <div class="stat-v info" id="s-avail">₹0</div>
        </div>
        <div class="stat">
          <div class="stat-l">GTT Committed</div>
          <div class="stat-v warn" id="s-gtt">₹0</div>
        </div>
        <div class="stat">
          <div class="stat-l">Unrealized P&L</div>
          <div class="stat-v" id="s-unr">₹0</div>
          <div class="stat-s" id="s-rl">rl: ₹0</div>
        </div>
      </div>

      <!-- Sub-tabs -->
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="switchSubTab('brief')">Daily Brief</button>
        <button class="sub-tab" onclick="switchSubTab('holdings')">Holdings</button>
        <button class="sub-tab" onclick="switchSubTab('gtt')">GTT Orders</button>
        <button class="sub-tab" onclick="switchSubTab('pipeline')">Pipeline</button>
        <button class="sub-tab" onclick="switchSubTab('events')">📅 Events</button>
        <button class="sub-tab" onclick="switchSubTab('fib')">Fib Planner</button>
      </div>

      <!-- Screen Container -->
      <div class="screens">
        <!-- Daily Brief -->
        <div class="screen active" id="sub-brief">
          <div id="brief-body"></div>
        </div>

        <!-- Holdings -->
        <div class="screen" id="sub-holdings">
          <div id="holdings-body"></div>
        </div>

        <!-- GTT Orders -->
        <div class="screen" id="sub-gtt">
          <div id="gtt-body"></div>
        </div>

        <!-- Pipeline -->
        <div class="screen" id="sub-pipeline">
          <div id="pipeline-body"></div>
        </div>

        <!-- Events -->
        <div class="screen" id="sub-events">
          <div id="events-upcoming"></div>
          <div id="events-all"></div>
          <div id="events-banner"></div>
        </div>

        <!-- Fib Planner -->
        <div class="screen" id="sub-fib">
          <div id="fib-body"></div>
        </div>
      </div>
    </div>

    <!-- Cycles Screen -->
    <div id="screen-cycles" style="display:none;overflow-y:auto;flex:1"></div>

    <!-- Settings Screen -->
    <div id="screen-settings" style="display:none;overflow-y:auto;flex:1"></div>
  </div>

  <!-- Edit Holding Modal -->
  <div class="modal" id="modal-edit-holding">
    <div class="modal-content">
      <button class="modal-close" onclick="closeEditHolding()">×</button>
      <div class="modal-header">Edit Holding</div>
      <div class="form-group">
        <label class="form-label">Symbol</label>
        <input class="form-input" id="edit-symbol" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="edit-name">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input class="form-input" id="edit-qty" type="number">
      </div>
      <div class="form-group">
        <label class="form-label">Average Price</label>
        <input class="form-input" id="edit-avg" type="number" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Current Price</label>
        <input class="form-input" id="edit-cmp" type="number" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Sector</label>
        <input class="form-input" id="edit-sector">
      </div>
      <div class="form-group">
        <label class="form-label">Realized P&L</label>
        <input class="form-input" id="edit-realized" type="number" step="0.01">
      </div>
      <div class="form-buttons">
        <button class="btn btn-primary" onclick="saveEditHolding()">Save</button>
        <button class="btn btn-secondary" onclick="closeEditHolding()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- New Holding Modal -->
  <div class="modal" id="modal-new-holding">
    <div class="modal-content">
      <button class="modal-close" onclick="closeNewHolding()">×</button>
      <div class="modal-header">Add New Holding</div>
      <div class="form-group">
        <label class="form-label">Symbol (e.g., SIEMEN)</label>
        <input class="form-input" id="new-symbol" placeholder="SYMBOL">
      </div>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="new-name" placeholder="Company Name">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input class="form-input" id="new-qty" type="number" min="0" step="1">
      </div>
      <div class="form-group">
        <label class="form-label">Average Price (₹)</label>
        <input class="form-input" id="new-avg" type="number" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Current Price (₹)</label>
        <input class="form-input" id="new-cmp" type="number" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Sector</label>
        <input class="form-input" id="new-sector" placeholder="e.g., IT, Finance">
      </div>
      <div class="form-buttons">
        <button class="btn btn-primary" onclick="saveNewHolding()">Add</button>
        <button class="btn btn-secondary" onclick="closeNewHolding()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Edit GTT Modal -->
  <div class="modal" id="modal-edit-gtt">
    <div class="modal-content">
      <button class="modal-close" onclick="closeEditGTT()">×</button>
      <div class="modal-header">Edit GTT Orders</div>
      
      <div style="margin-bottom: 20px;">
        <div style="font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--green);">Buy GTTs</div>
        <div id="gtt-buy-list" style="background: var(--bg3); border-radius: 8px; padding: 12px; margin-bottom: 12px; max-height: 150px; overflow-y: auto;"></div>
        <button class="btn btn-primary" style="width: 100%" onclick="openAddBuyGTT()">+ Add Buy GTT</button>
      </div>

      <div style="margin-bottom: 20px;">
        <div style="font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--red);">Sell GTTs</div>
        <div id="gtt-sell-list" style="background: var(--bg3); border-radius: 8px; padding: 12px; margin-bottom: 12px; max-height: 150px; overflow-y: auto;"></div>
        <button class="btn btn-primary" style="width: 100%" onclick="openAddSellGTT()">+ Add Sell GTT</button>
      </div>

      <div class="form-buttons">
        <button class="btn btn-secondary" onclick="closeEditGTT()">Done</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Buy GTT Modal -->
  <div class="modal" id="modal-buy-gtt">
    <div class="modal-content">
      <button class="modal-close" onclick="closeAddBuyGTT()">×</button>
      <div class="modal-header">Add Buy GTT</div>
      <div class="form-group">
        <label class="form-label">Symbol</label>
        <input class="form-input" id="buy-gtt-symbol" placeholder="SYMBOL">
      </div>
      <div class="form-group">
        <label class="form-label">Buy Price (₹)</label>
        <input class="form-input" id="buy-gtt-price" type="number" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input class="form-input" id="buy-gtt-qty" type="number" step="1" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Note (e.g., L1, L2)</label>
        <input class="form-input" id="buy-gtt-note" placeholder="Optional">
      </div>
      <div class="form-buttons">
        <button class="btn btn-primary" onclick="saveBuyGTT()">Add</button>
        <button class="btn btn-secondary" onclick="closeAddBuyGTT()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Sell GTT Modal -->
  <div class="modal" id="modal-sell-gtt">
    <div class="modal-content">
      <button class="modal-close" onclick="closeAddSellGTT()">×</button>
      <div class="modal-header">Add Sell GTT</div>
      <div class="form-group">
        <label class="form-label">Symbol</label>
        <input class="form-input" id="sell-gtt-symbol" placeholder="SYMBOL">
      </div>
      <div class="form-group">
        <label class="form-label">Sell Price (₹)</label>
        <input class="form-input" id="sell-gtt-price" type="number" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input class="form-input" id="sell-gtt-qty" type="number" step="1" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Note</label>
        <input class="form-input" id="sell-gtt-note" placeholder="Optional">
      </div>
      <div class="form-buttons">
        <button class="btn btn-primary" onclick="saveSellGTT()">Add</button>
        <button class="btn btn-secondary" onclick="closeAddSellGTT()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add to Watchlist Modal -->
  <div class="modal" id="modal-pipe">
    <div class="modal-content">
      <button class="modal-close" onclick="closeAddPipeline()">×</button>
      <div class="modal-header">Add to Watchlist</div>
      <div class="form-group">
        <label class="form-label">Symbol</label>
        <input class="form-input" id="pipe-symbol" placeholder="e.g. RELIANCE" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="form-group">
        <label class="form-label">LTP / Last Price (₹)</label>
        <input class="form-input" id="pipe-ltp" type="number" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="form-buttons">
        <button class="btn btn-primary" onclick="saveAddPipeline()">Add</button>
        <button class="btn btn-secondary" onclick="closeAddPipeline()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add / Edit Event Modal -->
  <div class="modal" id="modal-event">
    <div class="modal-content">
      <button class="modal-close" onclick="closeEventModal()">×</button>
      <div class="modal-header" id="event-modal-header">Add Event</div>
      <input type="hidden" id="event-id-hidden">
      <div class="form-group">
        <label class="form-label">Stock Symbol</label>
        <input class="form-input" id="event-stock" placeholder="e.g. INFY" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="form-group">
        <label class="form-label">Event Type</label>
        <select class="form-input" id="event-type">
          <option>Earnings</option>
          <option>Results</option>
          <option>Dividend</option>
          <option>Ex-Date</option>
          <option>AGM</option>
          <option>Bonus</option>
          <option>Rights</option>
          <option>Split</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="event-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Title / Notes (optional)</label>
        <input class="form-input" id="event-title" placeholder="e.g. Q3 FY26 results">
      </div>
      <div class="form-buttons">
        <button class="btn btn-primary" onclick="saveEvent()">Save</button>
        <button class="btn btn-secondary" onclick="closeEventModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Bootstrap State (hidden data for initialization) -->
  <script type="application/json" id="bootstrap-state">{
    "pf": [],
    "buys": [],
    "sells": [],
    "avail": 0,
    "pipe": [],
    "events": [],
    "cycles": [],
    "settings": {"bufferTarget": 7}
  }
  </script>

  <script>
    // ============ GLOBALS ============
    let pf = [];
    let BUYS = [];
    let SELLS = [];
    let PIPE = [];
    let AVAIL_LIMITS = 0;
    let EVENTS = [];
    let CYCLES = [];
    let SETTINGS = { bufferTarget: 7 };
    let db = null;
    let sortMode = 'sector';
    let currentMain = 'portfolio';
    let currentSub = 'brief';

    // ============ INDEXEDDB SETUP ============
    function initDB() {
      return new Promise((resolve, reject) => {
        // Use completely new DB name to avoid old app conflicts
        // This prevents any VersionError from old 'SpiralDB'
        const req = indexedDB.open('spiral-portfolio-2026', 1);
        
        req.onupgradeneeded = (event) => {
          const db = event.target.result;
          // Create fresh store (this is first version of new DB)
          if (!db.objectStoreNames.contains('data')) {
            db.createObjectStore('data', { keyPath: 'key' });
          }
        };
        
        req.onsuccess = () => {
          db = req.result;
          console.log('✅ IndexedDB ready (spiral-portfolio-2026)');
          resolve();
        };
        
        req.onerror = (e) => {
          console.error('❌ IndexedDB init failed:', e.target.error);
          // Don't reject - let app continue with bootstrap state
          resolve();
        };
        
        req.onblocked = () => {
          console.warn('⚠️ IndexedDB blocked - close other browser tabs with this app');
        };
      });
    }

    async function dbGet(key) {
      return new Promise((resolve, reject) => {
        try {
          const txn = db.transaction(['data']);
          const req = txn.objectStore('data').get(key);
          req.onsuccess = () => resolve(req.result?.value);
          req.onerror = () => reject(req.error);
        } catch (e) {
          reject(e);
        }
      });
    }

    async function dbSet(key, value) {
      return new Promise((resolve, reject) => {
        try {
          const txn = db.transaction(['data'], 'readwrite');
          const req = txn.objectStore('data').put({ key, value });
          req.onsuccess = () => resolve(value);
          req.onerror = () => reject(req.error);
        } catch (e) {
          reject(e);
        }
      });
    }

    // ============ STATE MANAGEMENT ============
    async function loadState() {
      try {
        // Try IndexedDB first
        const idbPf = await dbGet('pf');
        if (idbPf && Array.isArray(idbPf)) {
          pf = idbPf;
          BUYS = (await dbGet('buys')) || [];
          SELLS = (await dbGet('sells')) || [];
          PIPE = (await dbGet('pipe')) || [];
          AVAIL_LIMITS = (await dbGet('avail')) || 0;
          EVENTS = (await dbGet('events')) || [];
          CYCLES = (await dbGet('cycles')) || [];
          SETTINGS = (await dbGet('settings')) || { bufferTarget: 7 };
          return;
        }
      } catch (e) {
        console.warn('IDB load failed:', e);
      }

      // Fall back to bootstrap state
      const bootstrapEl = document.getElementById('bootstrap-state');
      if (bootstrapEl && bootstrapEl.textContent) {
        try {
          const state = JSON.parse(bootstrapEl.textContent);
          pf = state.pf || [];
          BUYS = state.buys || [];
          SELLS = state.sells || [];
          PIPE = state.pipe || [];
          AVAIL_LIMITS = state.avail || 0;
          EVENTS = state.events || [];
          CYCLES = state.cycles || [];
          SETTINGS = state.settings || { bufferTarget: 7 };
          console.log('✅ Bootstrap state loaded from script tag');
        } catch (e) {
          console.error('❌ Bootstrap parse failed:', e);
        }
      } else {
        console.warn('⚠️ No bootstrap state found');
      }
    }

    async function saveState() {
      try {
        await dbSet('pf', pf);
        await dbSet('buys', BUYS);
        await dbSet('sells', SELLS);
        await dbSet('pipe', PIPE);
        await dbSet('avail', AVAIL_LIMITS);
        await dbSet('events', EVENTS);
        await dbSet('cycles', CYCLES);
        await dbSet('settings', SETTINGS);
      } catch (e) {
        console.error('Save failed:', e);
      }
    }

    // ============ CALCULATIONS ============
    function getLtp(symbol) {
      const h = pf.find(p => p.s === symbol);
      return h ? h.cmp : 0;
    }

    function computeGTT() {
      return BUYS.reduce((sum, b) => sum + (b.p * b.q), 0);
    }

    function fc(n) {
      return new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(n);
    }

    function f2(n) {
      return parseFloat(n).toFixed(2);
    }

    // ============ RENDER FUNCTIONS ============
    function renderStats() {
      const invested = pf
        .filter(p => p.s !== 'ICICFD')
        .reduce((sum, p) => sum + (p.q * p.avg), 0);
      
      const current = pf
        .filter(p => p.s !== 'ICICFD')
        .reduce((sum, p) => sum + (p.q * p.cmp), 0);
      
      const unrealized = current - invested;
      const realized = pf
        .filter(p => p.s !== 'ICICFD')
        .reduce((sum, p) => sum + p.r, 0);
      
      const gttCommitted = computeGTT();

      document.getElementById('s-inv').textContent = fc(invested);
      document.getElementById('s-cur').textContent = fc(current);
      document.getElementById('s-avail').textContent = fc(AVAIL_LIMITS);
      document.getElementById('s-gtt').textContent = fc(gttCommitted);
      
      const unrEl = document.getElementById('s-unr');
      unrEl.textContent = fc(unrealized);
      unrEl.className = 'stat-v ' + (unrealized >= 0 ? 'green' : 'red');
      
      const rlEl = document.getElementById('s-rl');
      rlEl.textContent = `rl: ${fc(realized)}`;
      rlEl.className = 'stat-s ' + (realized >= 0 ? 'green' : 'red');
    }

    function renderHoldings() {
      const body = document.getElementById('holdings-body');
      if (!body) return;

      const invested = pf
        .filter(p => p.s !== 'ICICFD')
        .reduce((sum, p) => sum + (p.q * p.avg), 0);
      const current = pf
        .filter(p => p.s !== 'ICICFD')
        .reduce((sum, p) => sum + (p.q * p.cmp), 0);
      const unrealized = current - invested;
      const realized = pf
        .filter(p => p.s !== 'ICICFD')
        .reduce((sum, p) => sum + p.r, 0);

      let html = `
        <button class="btn btn-primary" style="width:100%;margin-bottom:12px" onclick="openNewHolding()">+ Add New Holding</button>
        <div style="background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div>
            <div style="font-size:9px;color:var(--textS)">Current Value</div>
            <div style="font-size:13px;font-weight:600;font-family:var(--mono)">${fc(current)}</div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--textS)">Unrealized</div>
            <div style="font-size:13px;font-weight:600;font-family:var(--mono);color:${unrealized >= 0 ? 'var(--green)' : 'var(--red)'}">${fc(unrealized)}</div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--textS)">Realized (all)</div>
            <div style="font-size:13px;font-weight:600;font-family:var(--mono);color:${realized >= 0 ? 'var(--green)' : 'var(--red)'}">${fc(realized)}</div>
          </div>
        </div>
      `;

      const active = pf.filter(p => p.q > 0 && p.s !== 'ICICFD');
      
      active.forEach(p => {
        const unrealizedUnit = p.q * (p.cmp - p.avg);
        const pctChange = p.avg > 0 ? ((p.cmp - p.avg) / p.avg * 100) : 0;
        const color = unrealizedUnit >= 0 ? 'var(--green)' : 'var(--red)';

        html += `
          <div class="h-row">
            <div>
              <div class="h-stock">
                ${p.st === 'core' ? '🔵' : p.st === 'hold' ? '🟢' : p.st === 'reduce' ? '🟡' : '🔴'} ${p.s}
                <span style="font-size:10px;font-weight:400;color:var(--textS)">${p.q}u · avg ${fc(p.avg)}</span>
                <span onclick="openEditHolding('${p.s}')" style="font-size:10px;border:1px solid var(--textS);border-radius:4px;padding:1px 6px;margin-left:8px;cursor:pointer;color:var(--textS);white-space:nowrap">edit</span>
                <span onclick="deleteHolding('${p.s}')" style="font-size:10px;border:1px solid var(--red);border-radius:4px;padding:1px 6px;margin-left:4px;cursor:pointer;color:var(--red);white-space:nowrap">✕</span>
              </div>
              <div style="font-size:10px;color:var(--textS);margin-top:2px">
                ${p.sec} · rl: <span style="color:${p.r >= 0 ? 'var(--green)' : 'var(--red)'}">${fc(p.r)}</span>
              </div>
              <div style="font-size:10px;color:var(--textS);margin-top:1px">
                Inv: <span style="color:var(--text);font-family:var(--mono)">${fc(p.q * p.avg)}</span> · Mkt: <span style="color:var(--text);font-family:var(--mono)">${fc(p.q * p.cmp)}</span>
              </div>
            </div>
            <div class="h-right">
              <div class="h-cmp" id="cmp-display-${p.s}" onclick="editCmp('${p.s}')">${fc(p.cmp)}</div>
              <div class="h-unr" style="color:${color}">${fc(unrealizedUnit)} (${pctChange > 0 ? '+' : ''}${pctChange.toFixed(1)}%)</div>
              <div style="font-size:10px;color:var(--textT);font-family:var(--mono)">total ${fc(unrealizedUnit + p.r)}</div>
            </div>
          </div>
        `;
      });

      body.innerHTML = html;
    }

    function renderGTT() {
      const body = document.getElementById('gtt-body');
      if (!body) return;

      // Collect all unique symbols across BUYS and SELLS
      const syms = [...new Set([...BUYS.map(b => b.s), ...SELLS.map(s => s.s)])].sort();

      let html = '<button class="btn btn-primary" style="width:100%;margin-bottom:16px" onclick="openEditGTT()">✏️ Manage GTT Orders</button>';

      if (syms.length === 0) {
        html += '<div style="color:var(--textS);padding:12px;text-align:center">No GTT orders set. Use Manage GTT Orders to add buy/sell ladders.</div>';
        body.innerHTML = html;
        return;
      }

      syms.forEach(sym => {
        const h = pf.find(p => p.s === sym);
        const pipe = PIPE.find(p => p.s === sym);
        const cmp = h ? h.cmp : (pipe ? pipe.ltp : 0);

        const buyRows = BUYS.filter(b => b.s === sym);
        const sellRows = SELLS.filter(s => s.s === sym);

        const totalBuyCapital = buyRows.reduce((s, b) => s + b.p * b.q, 0);
        const totalSellValue = sellRows.reduce((s, b) => s + b.p * b.q, 0);

        html += `<div style="background:var(--bg3);border-radius:8px;padding:14px;margin-bottom:16px;border:1px solid var(--border)">`;
        html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">
          <div style="font-size:14px;font-weight:700">${sym}</div>
          <div style="font-size:11px;font-family:var(--mono);color:var(--info)">${cmp > 0 ? 'CMP: ' + fc(cmp) : 'No CMP'}</div>
          <div style="font-size:10px;font-family:var(--mono);color:var(--textS)">${totalBuyCapital > 0 ? 'Buy: ' + fc(totalBuyCapital) : ''}${totalSellValue > 0 ? '  Sell: ' + fc(totalSellValue) : ''}</div>
        </div>`;

        if (buyRows.length > 0) {
          html += `<div style="font-size:11px;font-weight:600;color:var(--green);margin-bottom:6px">Buy Ladder</div>`;
          html += `<table class="gtt-table" style="margin-bottom:12px"><thead><tr>
            <th>Note</th><th style="color:var(--green)">Price</th><th>Qty</th><th>Capital</th><th>Gap%</th>
          </tr></thead><tbody>`;
          let buyTotal = 0;
          buyRows.forEach(b => {
            const gap = cmp > 0 ? ((b.p - cmp) / cmp * 100) : null;
            const gapStr = gap !== null ? `<span style="color:${gap < 0 ? 'var(--green)' : 'var(--red)'}">${gap > 0 ? '+' : ''}${gap.toFixed(1)}%</span>` : '-';
            buyTotal += b.p * b.q;
            html += `<tr>
              <td style="color:var(--textS);font-size:10px">${b.note || '-'}</td>
              <td style="color:var(--green)">${fc(b.p)}</td>
              <td>${b.q}</td>
              <td>${fc(b.p * b.q)}</td>
              <td>${gapStr}</td>
            </tr>`;
          });
          html += `<tr style="background:var(--bg2)">
            <td colspan="3" style="color:var(--textS);font-size:10px">Total Buy</td>
            <td style="color:var(--green);font-weight:700">${fc(buyTotal)}</td><td></td>
          </tr></tbody></table>`;
        }

        if (sellRows.length > 0) {
          html += `<div style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:6px">Sell Ladder</div>`;
          html += `<table class="gtt-table"><thead><tr>
            <th>Note</th><th style="color:var(--red)">Price</th><th>Qty</th><th>Value</th><th>Gap%</th>
          </tr></thead><tbody>`;
          let sellTotal = 0;
          sellRows.forEach(s => {
            const gap = cmp > 0 ? ((s.p - cmp) / cmp * 100) : null;
            const gapStr = gap !== null ? `<span style="color:${gap > 0 ? 'var(--green)' : 'var(--red)'}">${gap > 0 ? '+' : ''}${gap.toFixed(1)}%</span>` : '-';
            sellTotal += s.p * s.q;
            html += `<tr>
              <td style="color:var(--textS);font-size:10px">${s.note || '-'}</td>
              <td style="color:var(--red)">${fc(s.p)}</td>
              <td>${s.q}</td>
              <td>${fc(s.p * s.q)}</td>
              <td>${gapStr}</td>
            </tr>`;
          });
          html += `<tr style="background:var(--bg2)">
            <td colspan="3" style="color:var(--textS);font-size:10px">Total Sell</td>
            <td style="color:var(--red);font-weight:700">${fc(sellTotal)}</td><td></td>
          </tr></tbody></table>`;
        }

        html += '</div>';
      });

      // Grand summary
      const gttCapital = computeGTT();
      const buffer = AVAIL_LIMITS - gttCapital;
      const totalSell = SELLS.reduce((s, b) => s + b.p * b.q, 0);
      html += `<div style="background:var(--bg3);padding:12px;border-radius:6px;margin-top:4px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;font-size:12px">
          <div>
            <div style="color:var(--textS);font-size:10px;margin-bottom:4px">Total Buy GTTs</div>
            <div style="font-weight:700;font-family:var(--mono);color:var(--green)">${fc(gttCapital)}</div>
          </div>
          <div>
            <div style="color:var(--textS);font-size:10px;margin-bottom:4px">Cash Buffer</div>
            <div style="font-weight:700;font-family:var(--mono);color:${buffer >= 0 ? 'var(--green)' : 'var(--red)'}">${fc(buffer)}</div>
          </div>
          <div>
            <div style="color:var(--textS);font-size:10px;margin-bottom:4px">Total Sell GTTs</div>
            <div style="font-weight:700;font-family:var(--mono);color:var(--red)">${fc(totalSell)}</div>
          </div>
        </div>
      </div>`;

      body.innerHTML = html;
    }

    function renderPipeline() {
      const body = document.getElementById('pipeline-body');
      if (!body) return;

      // Active holding symbols (q > 0)
      const holdingSyms = new Set(pf.filter(p => p.q > 0).map(p => p.s));

      // Auto-populate: BUYS symbols not in active holdings
      const gttPipeSyms = [...new Set(BUYS.map(b => b.s))].filter(s => !holdingSyms.has(s));

      // Manual watchlist symbols (deduplicate against GTT pipe)
      const gttSet = new Set(gttPipeSyms);
      const manualPipe = PIPE.filter(p => !holdingSyms.has(p.s) && !gttSet.has(p.s));

      // Combined list: GTT-sourced first, then manual
      const allPipe = [
        ...gttPipeSyms.map(sym => ({ sym, badge: 'GTT Active', badgeColor: 'var(--green)', ltp: getLtp(sym) || (PIPE.find(p => p.s === sym) ? PIPE.find(p => p.s === sym).ltp : 0), isManual: false })),
        ...manualPipe.map(p => ({ sym: p.s, badge: 'Watchlist', badgeColor: 'var(--info)', ltp: p.ltp, isManual: true }))
      ];

      let html = `<div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-primary" style="flex:1" onclick="openAddPipeline()">+ Add to Watchlist</button>
      </div>`;

      if (allPipe.length === 0) {
        html += '<div style="color:var(--textS);padding:20px;text-align:center;background:var(--bg3);border-radius:8px">No pipeline stocks. Stocks with Buy GTTs that are not held appear here automatically.</div>';
        body.innerHTML = html;
        return;
      }

      allPipe.forEach(item => {
        const { sym, badge, badgeColor, ltp, isManual } = item;
        const buyOrders = BUYS.filter(b => b.s === sym);

        // Build GTT table for this symbol
        let gttTableHtml = '';
        if (buyOrders.length > 0) {
          let totalCommit = 0;
          gttTableHtml = `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px">
            <thead><tr style="color:var(--textS)">
              <th style="text-align:left;padding:3px 6px">Note</th>
              <th style="text-align:right;padding:3px 6px">Price</th>
              <th style="text-align:right;padding:3px 6px">Qty</th>
              <th style="text-align:right;padding:3px 6px">Capital</th>
              <th style="text-align:right;padding:3px 6px">Gap%</th>
            </tr></thead><tbody>`;
          buyOrders.forEach(b => {
            const gap = ltp > 0 ? ((b.p - ltp) / ltp * 100) : null;
            const gapStr = gap !== null ? `<span style="color:${gap < 0 ? 'var(--green)' : 'var(--red)'}">${gap > 0 ? '+' : ''}${gap.toFixed(1)}%</span>` : '-';
            totalCommit += b.p * b.q;
            gttTableHtml += `<tr style="border-top:1px solid var(--border)">
              <td style="padding:3px 6px;color:var(--textS)">${b.note || '-'}</td>
              <td style="padding:3px 6px;text-align:right;color:var(--green);font-family:var(--mono)">${fc(b.p)}</td>
              <td style="padding:3px 6px;text-align:right;font-family:var(--mono)">${b.q}</td>
              <td style="padding:3px 6px;text-align:right;font-family:var(--mono)">${fc(b.p * b.q)}</td>
              <td style="padding:3px 6px;text-align:right">${gapStr}</td>
            </tr>`;
          });
          gttTableHtml += `<tr style="border-top:1px solid var(--border);background:var(--bg2)">
            <td colspan="3" style="padding:3px 6px;color:var(--textS)">Total Committed</td>
            <td style="padding:3px 6px;text-align:right;font-weight:700;font-family:var(--mono);color:var(--warn)">${fc(totalCommit)}</td>
            <td></td>
          </tr></tbody></table>`;
        }

        html += `<div style="background:var(--bg3);border-radius:8px;padding:14px;margin-bottom:12px;border:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:14px;font-weight:700">${sym}</span>
              <span style="font-size:10px;padding:2px 6px;border-radius:3px;background:${badgeColor}22;color:${badgeColor};font-weight:600">${badge}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:12px;font-family:var(--mono);color:var(--info);cursor:pointer;text-decoration:underline dotted" onclick="editPipeLTP('${sym}')">${ltp > 0 ? fc(ltp) : 'Set LTP'}</span>
              ${isManual ? `<button onclick="deletePipeline('${sym}')" style="background:none;border:1px solid var(--red);color:var(--red);cursor:pointer;padding:2px 8px;border-radius:4px;font-size:10px">✕ Remove</button>` : ''}
            </div>
          </div>
          ${gttTableHtml}
        </div>`;
      });

      body.innerHTML = html;
    }

    function editPipeLTP(sym) {
      const entry = PIPE.find(p => p.s === sym);
      const current = entry ? entry.ltp : 0;
      const val = prompt(`LTP for ${sym} (₹):`, current);
      if (val === null) return;
      const newVal = parseFloat(val);
      if (isNaN(newVal) || newVal <= 0) { alert('Invalid price'); return; }
      if (entry) {
        entry.ltp = newVal;
      } else {
        PIPE.push({ s: sym, ltp: newVal });
      }
      saveState();
      renderPipeline();
    }

    function openAddPipeline() {
      document.getElementById('pipe-symbol').value = '';
      document.getElementById('pipe-ltp').value = '';
      document.getElementById('modal-pipe').classList.add('active');
    }

    function closeAddPipeline() {
      document.getElementById('modal-pipe').classList.remove('active');
    }

    function saveAddPipeline() {
      const sym = document.getElementById('pipe-symbol').value.toUpperCase().trim();
      const ltp = parseFloat(document.getElementById('pipe-ltp').value);
      if (!sym) { alert('Enter a symbol'); return; }
      if (PIPE.find(p => p.s === sym)) { alert(sym + ' already in watchlist'); return; }
      PIPE.push({ s: sym, ltp: isNaN(ltp) ? 0 : ltp });
      saveState();
      closeAddPipeline();
      renderPipeline();
    }

    function deletePipeline(sym) {
      if (!confirm(`Remove ${sym} from watchlist?`)) return;
      PIPE = PIPE.filter(p => p.s !== sym);
      saveState();
      renderPipeline();
    }

    // ============ EVENTS ============
    function renderEvents() {
      const upcomingEl = document.getElementById('events-upcoming');
      const allEl = document.getElementById('events-all');
      const bannerEl = document.getElementById('events-banner');
      if (!upcomingEl) return;

      const today = new Date().toISOString().slice(0, 10);
      const typeColors = {
        'Earnings': 'var(--warn)', 'Results': 'var(--warn)',
        'Dividend': 'var(--green)', 'Ex-Date': 'var(--green)',
        'AGM': 'var(--info)', 'Split': 'var(--info)',
        'Bonus': '#a78bfa', 'Rights': '#a78bfa',
        'Other': 'var(--textS)'
      };

      const upcoming = EVENTS.filter(e => e.date >= today).sort((a, b) => a.date.localeCompare(b.date));
      const past = EVENTS.filter(e => e.date < today).sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);

      function daysDiff(dateStr) {
        const d = new Date(dateStr);
        const now = new Date(today);
        return Math.round((d - now) / 86400000);
      }

      function eventCard(ev) {
        const col = typeColors[ev.type] || 'var(--textS)';
        const diff = daysDiff(ev.date);

    function openAddEvent() {
      document.getElementById('event-modal-header').textContent = 'Add Event';

    function openEditEvent(id) {
      const ev = EVENTS.find(e => e.id === id);
      if (!ev) return;
      document.getElementById('event-modal-header').textContent = 'Edit Event';
      document.getElementById('event-id-hidden').value = ev.id;
      document.getElementById('event-stock').value = ev.s;
      document.getElementById('event-type').value = ev.type;
      document.getElementById('event-date').value = ev.date;
      document.getElementById('event-title').value = ev.title || '';
      document.getElementById('modal-event').classList.add('active');

    function closeEventModal() {
      document.getElementById('modal-event').classList.remove('active');
    }

    function saveEvent() {
      const id = document.getElementById('event-id-hidden').value;
      const s = document.getElementById('event-stock').value.toUpperCase().trim();
      const type = document.getElementById('event-type').value;
      const date = document.getElementById('event-date').value;
      const title = document.getElementById('event-title').value.trim();
      if (!s || !date) { alert('Symbol and date required'); return; }
      if (id) {
        const ev = EVENTS.find(e => e.id === id);
        if (ev) { ev.s = s; ev.type = type; ev.date = date; ev.title = title; }
      } else {
        EVENTS.push({ id: 'ev_' + Date.now(), s, type, date, title });
      }
      saveState();
      closeEventModal();
      renderEvents();
    }

    function deleteEvent(id) {
      if (!confirm('Delete this event?')) return;
      EVENTS = EVENTS.filter(e => e.id !== id);
      saveState();
      renderEvents();
    }

    // Call Netlify AI analysis function
    // ============ AI ANALYSIS ============
    function analyzePortfolio() {
      const holdings = pf.filter(p => p.q > 0 && p.s !== 'ICICFD');
      const invested = holdings.reduce((sum, p) => sum + (p.q * p.avg), 0);
      const current  = holdings.reduce((sum, p) => sum + (p.q * p.cmp), 0);
      const unrealized = current - invested;
      const realized   = holdings.reduce((sum, p) => sum + p.r, 0);
      const returnPct  = invested > 0 ? ((current - invested) / invested * 100) : 0;
      const gttCap  = computeGTT();
      const buffer  = AVAIL_LIMITS - gttCap;
      const totalPort  = invested + AVAIL_LIMITS;
      const bufferPct  = totalPort > 0 ? (buffer / totalPort * 100) : 0;

      // Per-stock breakdown sorted best→worst
      const stockAnalysis = holdings.map(p => {
        const inv  = p.q * p.avg;
        const mkt  = p.q * p.cmp;
        const unr  = mkt - inv;
        const pct  = p.avg > 0 ? ((p.cmp - p.avg) / p.avg * 100) : 0;
        const wt   = current > 0 ? (mkt / current * 100) : 0;
        const hasBuy  = BUYS.some(b => b.s === p.s);
        const hasSell = SELLS.some(s => s.s === p.s);
        return { s: p.s, n: p.n, sec: p.sec, inv, mkt, unr, pct, wt, hasBuy, hasSell, r: p.r, st: p.st };
      }).sort((a, b) => b.pct - a.pct);

      // Sector rollup
      const sectors = {};
      stockAnalysis.forEach(s => {
        if (!sectors[s.sec]) sectors[s.sec] = { inv: 0, mkt: 0 };
        sectors[s.sec].inv += s.inv;
        sectors[s.sec].mkt += s.mkt;
      });

      // Scoring
      let score = 5;
      if      (returnPct > 15)  score += 2.5;
      else if (returnPct > 10)  score += 2;
      else if (returnPct > 5)   score += 1.5;
      else if (returnPct > 2)   score += 0.5;
      else if (returnPct <= -10) score -= 2;
      else if (returnPct <= -5)  score -= 1;
      else if (returnPct < -2)   score -= 0.5;

      if      (bufferPct > 15) score += 2;
      else if (bufferPct > 8)  score += 1;
      else if (bufferPct > 3)  score += 0.5;
      else if (bufferPct > 0)  score -= 0.5;
      else                     score -= 2;

      if      (holdings.length >= 15) score += 1;
      else if (holdings.length >= 10) score += 0.5;
      else if (holdings.length < 5)   score -= 1;

      score = Math.max(1, Math.min(10, Math.round(score * 2) / 2));
      const scoreNote = score >= 8 ? 'Excellent' : score >= 6.5 ? 'Good' : score >= 5 ? 'Healthy' : 'Warning';

      // Recommendations
      const recs = [];
      stockAnalysis.forEach(s => {
        if (s.pct > 20 && !s.hasSell)
          recs.push({ t: 'warn', m: `${s.s} +${s.pct.toFixed(1)}% — no sell GTT set. Consider booking partial profits.` });
        if (s.pct < -10)
          recs.push({ t: 'alert', m: `${s.s} ${s.pct.toFixed(1)}% — review thesis. ${s.hasBuy ? 'Buy GTT active (averaging down).' : 'No averaging plan set.'}` });
        if (s.wt > 25)
          recs.push({ t: 'warn', m: `${s.s} is ${s.wt.toFixed(1)}% of portfolio — high concentration risk.` });
      });
      if (buffer < 0)
        recs.unshift({ t: 'alert', m: `CRITICAL: GTT commitments exceed cash by ${fc(Math.abs(buffer))}. Delete low-priority buy GTTs immediately.` });
      else if (bufferPct < 5 && totalPort > 0)
        recs.unshift({ t: 'warn', m: `Buffer is only ${bufferPct.toFixed(1)}% of portfolio. Target 5–8% minimum. Trim buy GTT capital.` });
      if (BUYS.length === 0)
        recs.push({ t: 'info', m: 'No buy GTTs set. Add dip-buy ladders to automate averaging on corrections.' });
      if (SELLS.length === 0 && returnPct > 5)
        recs.push({ t: 'info', m: 'Positive returns but no sell GTTs. Consider laddering profit-booking targets.' });

      return {
        score, scoreNote, recs, stockAnalysis, sectors,
        portfolio: { invested, current, unrealized, realized, returnPct, cash: AVAIL_LIMITS, gttCap, buffer, bufferPct, holdings: holdings.length, buys: BUYS.length, sells: SELLS.length }
      };
    }

    // ============ UI FUNCTIONS ============
    function switchMainTab(tab) {

      else if (tab === 'fib') renderFibPlanner();
    }

    function renderFibPlanner() {
      const body = document.getElementById('fib-body');
      if (!body) return;

      // Build stock list: active holdings + pipeline stocks
      const holdingStocks = pf.filter(p => p.q > 0 && p.s !== 'ICICFD');
      const holdingSyms = new Set(holdingStocks.map(p => p.s));
      const gttPipeSyms = [...new Set(BUYS.map(b => b.s))].filter(s => !holdingSyms.has(s));
      const manualPipeSyms = PIPE.filter(p => !holdingSyms.has(p.s) && !gttPipeSyms.includes(p.s)).map(p => p.s);

      const allStocks = [
        ...holdingStocks.map(p => ({ s: p.s, cmp: p.cmp })),
        ...gttPipeSyms.map(s => {
          const pipe = PIPE.find(p => p.s === s);
          return { s, cmp: pipe ? pipe.ltp : 0 };
        }),
        ...manualPipeSyms.map(s => {
          const pipe = PIPE.find(p => p.s === s);
          return { s, cmp: pipe ? pipe.ltp : 0 };
        })
      ];

      const options = allStocks.length > 0
        ? allStocks.map(st => `<option value="${st.s}" data-cmp="${st.cmp}">${st.s}${st.cmp > 0 ? ' (' + fc(st.cmp) + ')' : ''}</option>`).join('')
        : '<option value="">-- No stocks --</option>';

      body.innerHTML = `
        <div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:14px">Fibonacci Level Calculator</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
            <div class="form-group" style="margin:0">
              <label class="form-label">Stock</label>
              <select class="form-input" id="fib-stock" onchange="fibOnStockChange()">
                <option value="">-- Select --</option>
                ${options}
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Mode</label>
              <select class="form-input" id="fib-mode">
                <option value="buy">Buy Retracement</option>
                <option value="sell">Sell Extension</option>
              </select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
            <div class="form-group" style="margin:0">
              <label class="form-label">Swing High (₹)</label>
              <input class="form-input" id="fib-high" type="number" step="0.01" placeholder="High">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Swing Low (₹)</label>
              <input class="form-input" id="fib-low" type="number" step="0.01" placeholder="Low">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Total Allocation (₹)</label>
              <input class="form-input" id="fib-alloc" type="number" step="1000" placeholder="100000">
            </div>
          </div>
          <button class="btn btn-primary" style="width:100%" onclick="fibCalculate()">Calculate Fibonacci Levels</button>
        </div>
        <div id="fib-results"></div>
      `;
    }

    function fibOnStockChange() {
      const sel = document.getElementById('fib-stock');
      const opt = sel.options[sel.selectedIndex];
      const cmp = parseFloat(opt ? opt.getAttribute('data-cmp') : 0) || 0;
      if (cmp > 0) {
        document.getElementById('fib-high').placeholder = 'High (CMP ~' + cmp.toFixed(0) + ')';
        document.getElementById('fib-low').placeholder = 'Low (CMP ~' + cmp.toFixed(0) + ')';
      }
    }

    function fibCalculate() {
      const sym = document.getElementById('fib-stock').value;
      const mode = document.getElementById('fib-mode').value;
      const high = parseFloat(document.getElementById('fib-high').value);
      const low = parseFloat(document.getElementById('fib-low').value);
      const alloc = parseFloat(document.getElementById('fib-alloc').value);

      if (!high || !low || high <= low) { alert('Enter valid Swing High and Swing Low (High > Low)'); return; }
      if (!alloc || alloc <= 0) { alert('Enter a valid Total Allocation'); return; }

      const sel = document.getElementById('fib-stock');
      const opt = sel.options[sel.selectedIndex];
      const cmp = parseFloat(opt ? opt.getAttribute('data-cmp') : 0) || 0;

      const range = high - low;

      // Buy retracement: levels measured from High downward
      // Sell extension: levels measured from Low upward and beyond
      let levels;
      if (mode === 'buy') {
        levels = [
          { pct: 0,    label: '0% (High)',   price: high,                   active: false },
          { pct: 23.6, label: '23.6%',       price: high - 0.236 * range,   active: true  },
          { pct: 38.2, label: '38.2%',       price: high - 0.382 * range,   active: true  },
          { pct: 50,   label: '50%',         price: high - 0.500 * range,   active: true  },
          { pct: 61.8, label: '61.8%',       price: high - 0.618 * range,   active: true  },
          { pct: 78.6, label: '78.6%',       price: high - 0.786 * range,   active: true  },
          { pct: 100,  label: '100% (Low)',  price: low,                    active: false },
        ];
      } else {
        levels = [
          { pct: 0,     label: '0% (Low)',   price: low,                    active: false },
          { pct: 23.6,  label: '23.6%',      price: low + 0.236 * range,    active: false },
          { pct: 38.2,  label: '38.2%',      price: low + 0.382 * range,    active: false },
          { pct: 50,    label: '50%',        price: low + 0.500 * range,    active: false },
          { pct: 61.8,  label: '61.8%',      price: low + 0.618 * range,    active: false },
          { pct: 78.6,  label: '78.6%',      price: low + 0.786 * range,    active: false },
          { pct: 100,   label: '100% (High)',price: high,                   active: false },
          { pct: 127.2, label: '127.2% Ext', price: low + 1.272 * range,    active: true  },
          { pct: 161.8, label: '161.8% Ext', price: low + 1.618 * range,    active: true  },
          { pct: 200,   label: '200% Ext',   price: low + 2.000 * range,    active: true  },
          { pct: 261.8, label: '261.8% Ext', price: low + 2.618 * range,    active: true  },
        ];
      }

      const activeLevels = levels.filter(l => l.active);
      const allocPerLevel = alloc / activeLevels.length;

      let rows = '';
      levels.forEach(lv => {
        const price = lv.price;
        const qty = lv.active ? Math.floor(allocPerLevel / price) : 0;
        const capital = qty * price;
        const gap = cmp > 0 ? ((price - cmp) / cmp * 100) : null;
        const gapStr = gap !== null ? `${gap > 0 ? '+' : ''}${gap.toFixed(1)}%` : '-';
        const gapColor = gap !== null ? (mode === 'buy' ? (gap < 0 ? 'var(--green)' : 'var(--red)') : (gap > 0 ? 'var(--green)' : 'var(--red)')) : 'var(--textS)';
        const rowStyle = lv.active ? '' : 'opacity:0.4;';
        const priceColor = mode === 'buy' ? 'var(--green)' : 'var(--red)';
        const note = `${sym ? sym + ' ' : ''}${lv.label}`;
        const addBtn = lv.active && sym && qty > 0
          ? `<button onclick="fibAddGTT('${sym}','${mode}',${price.toFixed(2)},${qty},'${note.replace(/'/g, '')}')" style="background:none;border:1px solid var(--info);color:var(--info);cursor:pointer;padding:2px 6px;border-radius:3px;font-size:10px">+GTT</button>`
          : '';
        rows += `<tr style="${rowStyle}border-bottom:1px solid var(--border)">
          <td style="padding:6px 8px;font-size:11px;color:var(--textS)">${lv.label}</td>
          <td style="padding:6px 8px;text-align:right;font-family:var(--mono);color:${priceColor}">${fc(price)}</td>
          <td style="padding:6px 8px;text-align:right;font-family:var(--mono)">${qty > 0 ? qty : '-'}</td>
          <td style="padding:6px 8px;text-align:right;font-family:var(--mono)">${capital > 0 ? fc(capital) : '-'}</td>
          <td style="padding:6px 8px;text-align:right;color:${gapColor};font-family:var(--mono)">${gapStr}</td>
          <td style="padding:6px 8px;text-align:center">${addBtn}</td>
        </tr>`;
      });

      const totalQty = activeLevels.reduce((s, lv) => s + Math.floor(allocPerLevel / lv.price), 0);
      const totalCap = activeLevels.reduce((s, lv) => s + Math.floor(allocPerLevel / lv.price) * lv.price, 0);

      const resultsEl = document.getElementById('fib-results');
      if (!resultsEl) return;
      resultsEl.innerHTML = `
        <div style="background:var(--bg3);border-radius:8px;padding:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:13px;font-weight:700">${sym || 'Results'} — ${mode === 'buy' ? 'Buy Retracement' : 'Sell Extension'}</div>
            ${cmp > 0 ? `<div style="font-size:11px;color:var(--info);font-family:var(--mono)">CMP: ${fc(cmp)}</div>` : ''}
          </div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead><tr style="color:var(--textS);border-bottom:2px solid var(--border)">
                <th style="text-align:left;padding:6px 8px">Level</th>
                <th style="text-align:right;padding:6px 8px">Price</th>
                <th style="text-align:right;padding:6px 8px">Qty</th>
                <th style="text-align:right;padding:6px 8px">Capital</th>
                <th style="text-align:right;padding:6px 8px">Gap%</th>
                <th style="text-align:center;padding:6px 8px">Add</th>
              </tr></thead>
              <tbody>${rows}</tbody>
              <tfoot><tr style="background:var(--bg2);font-weight:700">
                <td style="padding:6px 8px;font-size:11px;color:var(--textS)">Total Active</td>
                <td></td>
                <td style="padding:6px 8px;text-align:right;font-family:var(--mono)">${totalQty}</td>
                <td style="padding:6px 8px;text-align:right;font-family:var(--mono);color:var(--warn)">${fc(totalCap)}</td>
                <td></td><td></td>
              </tr></tfoot>
            </table>
          </div>
        </div>
      `;
    }

    function fibAddGTT(sym, mode, price, qty, note) {
      if (mode === 'buy') {
        const dup = BUYS.find(b => b.s === sym && Math.abs(b.p - price) < 0.01);
        if (dup) { alert(`Buy GTT for ${sym} @ ${fc(price)} already exists`); return; }
        BUYS.push({ s: sym, p: price, q: qty, note });
        saveState();
        renderStats();
        alert(`Added Buy GTT: ${sym} @ ${fc(price)} x${qty}`);
      } else {
        const dup = SELLS.find(s => s.s === sym && Math.abs(s.p - price) < 0.01);
        if (dup) { alert(`Sell GTT for ${sym} @ ${fc(price)} already exists`); return; }
        SELLS.push({ s: sym, p: price, q: qty, note });
        saveState();
        renderStats();
        alert(`Added Sell GTT: ${sym} @ ${fc(price)} x${qty}`);
      }
    }

    // ============ CYCLES ============
    function renderCycles() {
      const el = document.getElementById('screen-cycles');
      if (!el) return;

      const phaseColors = { Accumulation: 'var(--info)', Bull: 'var(--green)', Distribution: 'var(--warn)', Bear: 'var(--red)' };
      const phaseActions = {
        Accumulation: ['Accumulate quality stocks at dips', 'Set aggressive buy GTT ladders (60-80% capital deployed)', 'Focus on fundamentally strong stocks', 'Be patient — cycles take time'],
        Bull: ['Hold winners, let profits run', 'Set trailing sell GTTs at key Fib levels', 'Book 20-30% on big winners (+30%)', 'Reduce new buy GTTs — wait for next cycle'],
        Distribution: ['Book profits on recent entries', 'Tighten sell GTTs closer to CMP', 'Build cash buffer to 20%+', 'Avoid chasing new entries'],
        Bear: ['Stay in cash / gold / debt', 'Only deploy capital at extreme oversold levels', 'Set buy GTTs very conservatively (big dips only)', 'Review and strengthen portfolio thesis']
      };
      const phaseTargets = {
        Accumulation: { equity: [60, 80], cash: [20, 40] },
        Bull:         { equity: [75, 90], cash: [10, 25] },
        Distribution: { equity: [40, 60], cash: [40, 60] },
        Bear:         { equity: [20, 40], cash: [60, 80] }

      const current = CYCLES.length > 0 ? CYCLES[CYCLES.length - 1] : null;

      const phaseColor = phaseColors[currentPhase] || 'var(--info)';

      // Portfolio alignment calc
      const invested = pf.filter(p => p.s !== 'ICICFD').reduce((s, p) => s + p.q * p.avg, 0);
      const total = invested + AVAIL_LIMITS;
      const equityPct = total > 0 ? (invested / total * 100) : 0;
      const cashPct = total > 0 ? (AVAIL_LIMITS / total * 100) : 0;
      const targets = phaseTargets[currentPhase] || phaseTargets.Accumulation;

      // Phase start & duration
      let phaseStartDate = current ? current.date : new Date().toISOString().slice(0, 10);
      const today = new Date().toISOString().slice(0, 10);
      const durationDays = Math.round((new Date(today) - new Date(phaseStartDate)) / 86400000);

      // Phase history (last 5, newest first)
      const history = [...CYCLES].reverse().slice(0, 5);

      el.innerHTML = `
        <div style="padding:16px;max-width:700px">
          <div style="font-size:16px;font-weight:700;margin-bottom:16px">Market Cycle Analysis</div>

          <!-- Phase Selector -->
          <div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px;border:2px solid ${phaseColor}">

                <div style="font-size:28px;font-weight:800;color:${phaseColor}">${currentPhase}</div>
                <div style="font-size:11px;color:var(--textS);margin-top:4px;font-family:var(--mono)">Since ${phaseStartDate} · ${durationDays}d</div>
              </div>
              <div>
                <select class="form-input" style="font-size:13px;font-weight:600" onchange="updateCyclePhase(this.value)">
                  ${['Accumulation','Bull','Distribution','Bear'].map(p =>
                    `<option value="${p}" ${p === currentPhase ? 'selected' : ''}>${p}</option>`
                  ).join('')}
                </select>
              </div>
            </div>
            <div style="font-size:11px;font-weight:600;color:var(--textS);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Recommended Actions</div>
            ${(phaseActions[currentPhase] || []).map(a =>
              `<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:12px">
                <span style="color:${phaseColor};flex-shrink:0">▸</span><span>${a}</span>
              </div>`
            ).join('')}
          </div>

          <!-- Portfolio Alignment -->
          <div style="background:var(--bg3);border-radius:8px;padding:14px;margin-bottom:16px">
            <div style="font-size:12px;font-weight:600;margin-bottom:12px">Portfolio Alignment</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;margin-bottom:10px">
              <div>
                <div style="font-size:10px;color:var(--textS);margin-bottom:4px">Equity Deployed</div>
                <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:${equityPct >= targets.equity[0] && equityPct <= targets.equity[1] ? 'var(--green)' : 'var(--warn)'}">${equityPct.toFixed(1)}%</div>
                <div style="font-size:10px;color:var(--textT)">Target: ${targets.equity[0]}–${targets.equity[1]}%</div>
              </div>
              <div>
                <div style="font-size:10px;color:var(--textS);margin-bottom:4px">Cash / Buffer</div>
                <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:${cashPct >= targets.cash[0] && cashPct <= targets.cash[1] ? 'var(--green)' : 'var(--warn)'}">${cashPct.toFixed(1)}%</div>
                <div style="font-size:10px;color:var(--textT)">Target: ${targets.cash[0]}–${targets.cash[1]}%</div>
              </div>
            </div>
            <div style="background:var(--bg2);border-radius:4px;height:8px;overflow:hidden">
              <div style="height:100%;width:${Math.min(equityPct,100).toFixed(1)}%;background:${phaseColor};transition:width .3s"></div>
            </div>
            <div style="font-size:10px;color:var(--textT);margin-top:4px">Equity bar (${equityPct.toFixed(1)}% of total capital)</div>
          </div>

          <!-- Notes -->
          <div style="background:var(--bg3);border-radius:8px;padding:14px;margin-bottom:16px">
            <div style="font-size:12px;font-weight:600;margin-bottom:8px">Phase Notes</div>
            <textarea id="cycle-notes" class="form-input" rows="3" placeholder="Add notes about current market conditions..." style="resize:vertical">${current ? (current.notes || '') : ''}</textarea>
            <button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="saveCycleNotes()">Save Notes</button>
          </div>

          <!-- History -->
          ${history.length > 1 ? `
          <div style="background:var(--bg3);border-radius:8px;padding:14px">
            <div style="font-size:12px;font-weight:600;margin-bottom:10px">Phase History (last 5)</div>
            ${history.map((c, i) => {
              const col = phaseColors[c.phase] || 'var(--textS)';
              const next = history[i - 1];
              const nextDate = next ? next.date : today;
              const dur = Math.round((new Date(nextDate) - new Date(c.date)) / 86400000);
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
                <span style="font-weight:600;color:${col}">${c.phase}</span>
                <span style="font-family:var(--mono);color:var(--textS)">${c.date}${i === 0 ? ' · current' : ' · ' + dur + 'd'}</span>
              </div>`;
            }).join('')}
          </div>` : ''}
        </div>
      `;
    }

    function updateCyclePhase(phase) {
      const today = new Date().toISOString().slice(0, 10);
      const last = CYCLES.length > 0 ? CYCLES[CYCLES.length - 1] : null;
      if (last && last.phase === phase) return; // no change
      CYCLES.push({ phase, date: today, notes: '' });
      saveState();
      renderCycles();
    }

    function saveCycleNotes() {
      const notes = document.getElementById('cycle-notes') ? document.getElementById('cycle-notes').value : '';
      if (CYCLES.length > 0) {
        CYCLES[CYCLES.length - 1].notes = notes;
        saveState();
        alert('Notes saved');
      }
    }

    // ============ SETTINGS ============
    function renderSettings() {
      const el = document.getElementById('screen-settings');
      if (!el) return;

      const active = pf.filter(p => p.q > 0 && p.s !== 'ICICFD');
      const invested = active.reduce((s, p) => s + p.q * p.avg, 0);
      const current = active.reduce((s, p) => s + p.q * p.cmp, 0);
      const gttCap = computeGTT();
      const sellVal = SELLS.reduce((s, b) => s + b.p * b.q, 0);

      el.innerHTML = `
        <div style="padding:16px;max-width:600px">
          <div style="font-size:16px;font-weight:700;margin-bottom:16px">Settings</div>

          <!-- Portfolio Settings -->
          <div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px">
            <div style="font-size:13px;font-weight:600;margin-bottom:12px">Portfolio Settings</div>
            <div class="form-group">
              <label class="form-label">Buffer Target %</label>
              <input class="form-input" id="setting-buffer" type="number" step="0.5" min="0" max="50" value="${SETTINGS.bufferTarget || 7}">
              <div style="font-size:10px;color:var(--textS);margin-top:4px">Target cash buffer as % of total portfolio (used in analysis alerts)</div>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="saveSettings()">Save Settings</button>
          </div>

          <!-- Portfolio Summary -->
          <div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px">
            <div style="font-size:13px;font-weight:600;margin-bottom:12px">Portfolio Summary</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:12px">
              ${[
                ['Holdings', active.length, ''],
                ['Buy GTTs', BUYS.length, ''],
                ['Sell GTTs', SELLS.length, ''],
                ['Events', EVENTS.length, ''],
                ['Invested', fc(invested), 'var(--text)'],
                ['Mkt Value', fc(current), current >= invested ? 'var(--green)' : 'var(--red)'],
                ['GTT Capital', fc(gttCap), 'var(--warn)'],
                ['Sell GTT Val', fc(sellVal), 'var(--red)'],
                ['Cash', fc(AVAIL_LIMITS), 'var(--info)'],
              ].map(([lbl, val, col]) => `
                <div style="background:var(--bg2);border-radius:5px;padding:8px">
                  <div style="font-size:9px;color:var(--textS);text-transform:uppercase;margin-bottom:3px">${lbl}</div>
                  <div style="font-size:12px;font-weight:700;font-family:var(--mono)${col ? ';color:' + col : ''}">${val}</div>
                </div>`).join('')}
            </div>
          </div>

          <!-- Data Management -->
          <div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px">
            <div style="font-size:13px;font-weight:600;margin-bottom:12px">Data Management</div>
            <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="exportData()">Export All Data (JSON)</button>
            <button class="btn btn-secondary" style="width:100%;margin-bottom:8px" onclick="importData()">Import Data (JSON)</button>
            <button class="btn btn-danger" style="width:100%;border:1px solid var(--red)" onclick="clearAllData()">Clear All Data</button>
            <input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">
          </div>

          <!-- App Info -->
          <div style="background:var(--bg3);border-radius:8px;padding:14px;text-align:center">
            <div style="font-size:12px;font-weight:600;margin-bottom:4px">Spiral Portfolio — v74</div>
            <div style="font-size:11px;color:var(--textS)">Data stored locally in browser IndexedDB · No server, no cloud</div>
          </div>
        </div>
      `;
    }

    function saveSettings() {
      const buf = parseFloat(document.getElementById('setting-buffer').value);
      if (isNaN(buf) || buf < 0) { alert('Invalid buffer target'); return; }
      SETTINGS.bufferTarget = buf;
      saveState();
      alert('Settings saved');
    }

    function exportData() {
      const today = new Date().toISOString().slice(0, 10);
      const data = { pf, buys: BUYS, sells: SELLS, pipe: PIPE, avail: AVAIL_LIMITS, events: EVENTS, cycles: CYCLES, settings: SETTINGS, exportDate: today };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `spiral-portfolio-${today}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData() {
      document.getElementById('import-file-input').click();
    }

    function handleImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!confirm('This will replace ALL current data. Continue?')) return;
          pf = data.pf || [];
          BUYS = data.buys || [];
          SELLS = data.sells || [];
          PIPE = data.pipe || [];
          AVAIL_LIMITS = data.avail || 0;
          EVENTS = data.events || [];
          CYCLES = data.cycles || [];
          SETTINGS = data.settings || { bufferTarget: 7 };
          saveState();
          renderAll();
          renderSettings();
          alert('Data imported successfully');
        } catch (err) {
          alert('Invalid JSON file: ' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    function clearAllData() {
      if (!confirm('Clear ALL data? This cannot be undone.')) return;
      if (!confirm('Are you sure? All holdings, GTTs, events and cycles will be erased.')) return;
      pf = []; BUYS = []; SELLS = []; PIPE = []; AVAIL_LIMITS = 0;
      EVENTS = []; CYCLES = []; SETTINGS = { bufferTarget: 7 };
      saveState();
      renderAll();
      renderCycles();
      renderSettings();
      alert('All data cleared');
    }

    // ============ LOG ENTRY ============
    function addLogEntry(type, symbol, qty, price, charges, note) {
      const stock = pf.find(p => p.s === symbol);
      if (!stock) {
        console.warn(`Stock ${symbol} not in portfolio`);
        return;
      }

      if (type === 'BUY_EXEC') {
        const totalCost = (qty * price) + charges;
        const newAvg = (stock.q * stock.avg + totalCost) / (stock.q + qty);
        stock.q += qty;
        stock.avg = newAvg;
      } else if (type === 'SELL_EXEC') {
        stock.q = Math.max(0, stock.q - qty);
        stock.r += (price - stock.avg) * qty;
      }

      saveState();
      renderAll();
    }

    // ============ INITIALIZATION ============
    async function init() {
      try {
        document.getElementById('status-meta').textContent = 'Loading...';
        
        // Initialize IndexedDB (non-blocking - app works without it)
        await initDB().catch(e => {
          console.warn('⚠️ IndexedDB unavailable, using bootstrap state only:', e.message);
        });
        
        // Load state (from IDB or bootstrap HTML)
        await loadState();
        
        // Render all UI
        renderAll();
        
        document.getElementById('status-meta').textContent = 'Ready';
        console.log('✅ App fully initialized');
        
      } catch (e) {
        console.error('❌ Fatal error:', e);
        document.getElementById('status-meta').textContent = 'Error: ' + e.message;
      }
    }

    // Helper: Delete old databases to force reset
    async function nukeOldDatabases() {
      return new Promise((resolve) => {
        const oldNames = ['SpiralDB', 'SpiralDB-v1', 'SpiralDB-v2'];
        let count = 0;
        
        oldNames.forEach(name => {
          const req = indexedDB.deleteDatabase(name);
          req.onsuccess = () => {
            console.log(`✅ Deleted: ${name}`);
            count++;
            if (count === oldNames.length) resolve();
          };
          req.onerror = () => {
            count++;
            if (count === oldNames.length) resolve();
          };
        });
        
        setTimeout(resolve, 3000);
      });
    }

    // Helper: Full reset (nukes old databases and reloads)
    async function fullReset() {
      console.log('🔄 Resetting app - deleting old databases...');
      await nukeOldDatabases();
      console.log('💥 Reset complete, reloading page...');
      setTimeout(() => location.reload(), 500);
    }

    // Print debug info
    console.log('%c⚡ SPIRAL APP v74 LOADED', 'color: #0ea5e9; font-weight: bold; font-size: 14px');
    console.log('If VersionError appears, type in console: fullReset()');

    // Start app on load
    document.addEventListener('DOMContentLoaded', init);
    window.addEventListener('load', init);
  </script>
</body>
</html>
